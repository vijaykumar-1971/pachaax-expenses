<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff7ed;min-height:100vh;padding-bottom:60px}

.card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border:2px solid #fed7aa}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}

button{cursor:pointer;border:none;font-family:inherit}

.primary{background:linear-gradient(90deg,#d97706,#ea580c);color:white}

.secondary{background:#e5e7eb;color:#374151}

.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f97316);color:white;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-transform:uppercase}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:16px;z-index:999}

.foot{position:fixed;bottom:0;left:0;right:0;background:#78350f;color:#fef3c7;padding:7px;text-align:center;font-size:11px;z-index:50}
.dbtn{background:none;color:#ef4444;padding:3px;font-size:16px}
.ebtn{background:none;color:#d97706;padding:3px;font-size:14px}
.rbtn{background:rgba(0,0,0,0.2);color:white;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:700}

.neg{color:#ef4444;font-weight:700;font-size:12px}

.fc{background:white;border-radius:12px;padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border:2px solid #fed7aa}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#1f2937;color:white;padding:9px 18px;border-radius:9px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.trip-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:linear-gradient(135deg,#fff7ed,#fef3c7)}
.trip-box{background:white;border-radius:18px;padding:22px;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.trip-item{background:#fff7ed;border:2px solid #fed7aa;border-radius:10px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.lbl{font-size:11px;font-weight:700;color:#6b7280;display:block;margin-bottom:4px;text-transform:uppercase}
/* AUTH */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:linear-gradient(135deg,#fff7ed,#fef3c7)}
.auth-box{background:white;border-radius:18px;padding:28px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.auth-tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:18px;gap:3px}
.auth-tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;background:none;color:#6b7280;text-align:center}
.auth-tab.on{background:white;color:#92400e;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.err-box{background:#fef2f2;border:2px solid #fca5a5;border-radius:9px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#b91c1c;font-weight:600}
.ok-box{background:#f0fdf4;border:2px solid #86efac;border-radius:9px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#15803d;font-weight:600}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase}

.badge-user{background:#f0fdf4;color:#15803d}
.badge-banned{background:#fef2f2;color:#b91c1c}
/* ADMIN */
.admin-hdr{background:linear-gradient(90deg,#7c3aed,#4f46e5);color:white;border-radius:12px;padding:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.user-card{background:white;border-radius:12px;padding:14px;margin-bottom:9px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border:2px solid #e5e7eb;display:flex;align-items:center;gap:10px}
.user-card.banned{border-color:#fca5a5;background:#fef2f2;opacity:0.8}
.user-actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.trip-admin-card{background:white;border-radius:12px;padding:12px 14px;margin-bottom:9px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border:2px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.banned-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:#fef2f2}
.banned-box{background:white;border-radius:18px;padding:28px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.1);border:2px solid #fca5a5}
.stat-box{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:12px;padding:14px;text-align:center;border:2px solid #ddd6fe}
.stat-box .num{font-size:28px;font-weight:900;color:#6d28d9}
.stat-box .lbl2{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
/* PERMISSIONS */
.member-row{display:flex;align-items:center;gap:8px;padding:8px;background:#f9fafb;border-radius:8px;margin-bottom:6px}
.member-row span{flex:1;font-size:13px;font-weight:600;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* VERIFY */
.verify-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:linear-gradient(135deg,#eff6ff,#f0fdf4)}
.verify-box{background:white;border-radius:18px;padding:28px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.1);text-align:center}
.copy-link{background:#f9fafb;border:2px solid #e5e7eb;border-radius:9px;padding:10px;font-size:11px;color:#374151;word-break:break-all;margin:10px 0;text-align:left;cursor:pointer}
.copy-link:hover{background:#fef3c7;border-color:#d97706}
/* DASHBOARD */
.dash-card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.07);border:2px solid #e5e7eb;cursor:pointer;transition:border-color 0.15s}
.dash-card:hover{border-color:#d97706}
.dash-card.active-trip{border-color:#d97706;background:#fffbeb}
.dash-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800}
.dash-settled{background:#f0fdf4;color:#15803d}
.dash-pending{background:#fef2f2;color:#b91c1c}
.dash-summary-bar{background:linear-gradient(90deg,#d97706,#ea580c);border-radius:12px;padding:14px 16px;margin-bottom:14px;color:white}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.dash-stat{background:rgba(255,255,255,0.15);border-radius:9px;padding:10px;text-align:center}
.dash-stat .n{font-size:20px;font-weight:900}
.dash-stat .l{font-size:10px;font-weight:700;opacity:0.8;margin-top:2px}
/* OTP */
.otp-input{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:9px;font-size:26px;font-weight:900;letter-spacing:10px;text-align:center;outline:none;font-family:inherit;background:white;display:block;margin-bottom:9px}
.otp-input:focus{border-color:#d97706}
.otp-timer{font-size:11px;color:#9ca3af;text-align:center;margin-bottom:12px}
.otp-timer span{color:#ef4444;font-weight:700}
/* CUSTOM CONFIRM */
.warn-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:16px;z-index:9998}
.warn-box{background:white;border-radius:16px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.warn-box h4{font-size:16px;font-weight:900;color:#1f2937;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.warn-box p{font-size:13px;color:#6b7280;margin-bottom:18px;line-height:1.5}
.warn-btns{display:flex;gap:8px}
.warn-btns button{flex:1;padding:11px;border-radius:10px;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:inherit}
</style>

<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<div id="warn-dialog" style="display:none"></div>

<script>
// ============ CONFIG ============
const FB      = 'https://pachaax-expenses-default-rtdb.firebaseio.com/trips';
const FB_AUTH = 'https://pachaax-expenses-default-rtdb.firebaseio.com/users';

// ============ EMAILJS CONFIG ============
// Fill in your EmailJS credentials below — they are baked into the HTML file
// and work seamlessly across all browsers without any setup step.
// Get them from https://emailjs.com → your account dashboard.
const EJS_PUBLIC_KEY  = 'wvK95DlAlD6E7ld7H';   // Account → General → Public Key
const EJS_SERVICE_ID  = 'service_pph2qsj';   // Email Services → your service → Service ID
const EJS_TEMPLATE_ID = 'template_rq1ptiv';  // Email Templates → your template → Template ID
// Template must have "To Email" = {{to_email}}
// Body variables: {{to_name}} {{otp_code}} {{purpose}} {{app_name}}

function getEjsCfg(){
  return { publicKey: EJS_PUBLIC_KEY, serviceId: EJS_SERVICE_ID, templateId: EJS_TEMPLATE_ID };
}
function ejsConfigured(){
  return EJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY' && !!EJS_SERVICE_ID && !!EJS_TEMPLATE_ID;
}

// ============ HELPERS ============
function eKey(email){ return email.toLowerCase().replace(/\./g,'__'); }
function eFromKey(k){ return k.replace(/__/g,'.'); }
function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function initials(s){ return (s||'?')[0].toUpperCase(); }
function genOtp(){ return String(Math.floor(100000+Math.random()*900000)); }

// ============ EMAILJS ============
function initEJS(){
  var c=getEjsCfg();
  if(!c.publicKey) return;
  try{ emailjs.init({ publicKey: c.publicKey }); }
  catch(e){ console.warn('EmailJS init failed', e); }
}

async function sendOtpEmail(toEmail, toName, otp, purpose){
  var c=getEjsCfg();
  try{
    await emailjs.send(
      c.serviceId,
      c.templateId,
      {
        to_email: toEmail,
        to_name:  toName,
        otp_code: otp,
        purpose:  purpose,
        app_name: 'Expense Track & Settlement'
      },
      { publicKey: c.publicKey }
    );
    return { ok: true };
  }catch(e){
    var msg = (e && (e.text || e.message || JSON.stringify(e))) || 'Unknown error';
    console.error('EmailJS send error:', e);
    return { ok: false, msg };
  }
}

// ============ STATE ============
let tripId      = localStorage.getItem('px-trip') || '';
let db          = { friends:[], expenses:[], settlements:[], meta:{} };
let trips       = [];
let tab         = 'expenses';
let syncing     = false;
let lastSync    = '';
let modal       = null;
let editId      = null;
let fname='', edesc='', eamt='', epayer='', esplit='equal', csplits={}, edate='', etime='', ecat='';

// --- AUTH ---
let currentUser = JSON.parse(localStorage.getItem('px-user') || 'null');
let authMode    = 'login'; // 'login'|'register'|'otp-verify'|'forgot'|'otp-reset'
let authErr     = '';
let authOk      = '';
let authLoading = false;
let adminSubTab = 'users';
let allUsers    = [];
let allTrips    = [];

// --- DASHBOARD ---
let dashData      = [];   // [{id, name, date, meta, friends, expenses, settlements}]
let dashLoading   = false;
let dashLoaded    = false;

// OTP flow state (persisted so page refresh doesn't lose it)
var _otpState = JSON.parse(localStorage.getItem('px-otp') || 'null');
// _otpState = { email, displayName, passwordHash, role, otp, sentAt, purpose:'verify'|'reset' }
var _otpResendCooldown = 0;
var _otpTimer = null;

// ============ TOAST ============
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ============ CUSTOM CONFIRM ============
var _warnCb = null;
function warnConfirm(message, onOk, okLabel, isDanger){
  okLabel  = okLabel  || 'Confirm';
  isDanger = isDanger !== false;
  _warnCb  = onOk;
  var d = document.getElementById('warn-dialog');
  d.style.display = 'block';
  d.innerHTML = `<div class="warn-overlay">
    <div class="warn-box">
      <h4>⚠️ Warning</h4>
      <p>${message}</p>
      <div class="warn-btns">
        <button style="background:#e5e7eb;color:#374151" onclick="_warnClose()">Cancel</button>
        <button style="background:${isDanger?'#ef4444':'#d97706'};color:white" onclick="_warnOk()">${okLabel}</button>
      </div>
    </div>
  </div>`;
}
function _warnClose(){ document.getElementById('warn-dialog').style.display='none'; _warnCb=null; }
function _warnOk(){ document.getElementById('warn-dialog').style.display='none'; if(_warnCb){ var cb=_warnCb; _warnCb=null; cb(); } }

// ============ HASH ============
async function hashPwd(pwd){
  var enc=new TextEncoder().encode(pwd);
  var buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ============ FIREBASE ============
function url(path)  { return FB+'/'+path+'.json'; }
function aurl(path) { return FB_AUTH+'/'+path+'.json'; }
async function fbGet(path)       { var r=await fetch(url(path)); return r.ok?r.json():null; }
async function fbSet(path,data)  { var r=await fetch(url(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.ok; }
async function fbDel(path)       { var r=await fetch(url(path),{method:'DELETE'}); return r.ok; }
async function faGet(path)       { var r=await fetch(aurl(path)); return r.ok?r.json():null; }
async function faSet(path,data)  { var r=await fetch(aurl(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.ok; }
async function faDel(path)       { var r=await fetch(aurl(path),{method:'DELETE'}); return r.ok; }

// ============ OTP HELPERS ============
function saveOtpState(s){ _otpState=s; localStorage.setItem('px-otp',JSON.stringify(s)); }
function clearOtpState(){ _otpState=null; localStorage.removeItem('px-otp'); }

function startResendTimer(){
  _otpResendCooldown=60;
  if(_otpTimer) clearInterval(_otpTimer);
  _otpTimer=setInterval(function(){
    _otpResendCooldown--;
    var el=document.getElementById('otp-countdown');
    if(el) el.textContent=_otpResendCooldown>0?'Resend in '+_otpResendCooldown+'s':'';
    var btn=document.getElementById('otp-resend');
    if(btn){ btn.disabled=_otpResendCooldown>0; btn.textContent=_otpResendCooldown>0?'Resend ('+_otpResendCooldown+'s)':'📧 Resend OTP'; }
    if(_otpResendCooldown<=0) clearInterval(_otpTimer);
  },1000);
}

async function doResendOtp(){
  if(!_otpState){ authMode='login'; render(); return; }
  var otp=genOtp();
  _otpState.otp=otp; _otpState.sentAt=Date.now();
  saveOtpState(_otpState);
  var purpose=_otpState.purpose==='verify'?'Email Verification':'Password Reset';
  var result=await sendOtpEmail(_otpState.email, _otpState.displayName||_otpState.email, otp, purpose);
  if(result.ok){
    toast('📧 OTP resent to '+_otpState.email);
  } else {
    authErr='Resend failed: '+result.msg; render();
  }
  startResendTimer();
}

// ============ AUTH ACTIONS ============
async function doLogin(){
  var u=(document.getElementById('au')||{value:''}).value.trim().toLowerCase();
  var p=(document.getElementById('ap')||{value:''}).value;
  authErr=''; authOk=''; authLoading=true; render();
  if(!u||!p){ authErr='Please fill all fields.'; authLoading=false; render(); return; }
  if(!isEmail(u)){ authErr='Enter a valid email address.'; authLoading=false; render(); return; }
  try{
    var rec=await faGet(eKey(u));
    if(!rec){ authErr='No account found. Please register.'; authLoading=false; render(); return; }
    if(rec.banned){ authErr='Your account has been suspended by an admin.'; authLoading=false; render(); return; }
    if(!rec.verified){ authErr='Email not verified. Please complete OTP verification.'; authLoading=false; render(); return; }
    var h=await hashPwd(p);
    if(h!==rec.passwordHash){ authErr='Incorrect password.'; authLoading=false; render(); return; }
    currentUser={email:u, role:rec.role||'user', displayName:rec.displayName||u};
    localStorage.setItem('px-user',JSON.stringify(currentUser));
    authErr=''; authLoading=false;
    toast('👋 Welcome back, '+currentUser.displayName+'!');
    loadCategories();
    render(); loadTrips();
  }catch(e){ authErr='Connection error. Please try again.'; authLoading=false; render(); }
}

async function doRegister(){
  var u=(document.getElementById('au')||{value:''}).value.trim().toLowerCase();
  var dn=(document.getElementById('adn')||{value:''}).value.trim();
  var p=(document.getElementById('ap')||{value:''}).value;
  var p2=(document.getElementById('ap2')||{value:''}).value;

// ============ CALC ============
function balances(){var b={};db.friends.forEach(f=>b[f.id]=0);db.expenses.forEach(e=>{b[e.paidBy]=(b[e.paidBy]||0)+e.amount;Object.entries(e.splitAmong).forEach(([id,a])=>b[id]=(b[id]||0)-a);});return b;}
// settlements() — returns each debt pair with full payment history
// db.settlements is now an array of {key, amount, paidAt} objects.
// Old format (plain strings) is migrated on the fly.
function normSettlements(){
  return (db.settlements||[]).map(s=>
    typeof s==='string' ? {key:s, amount:null, paidAt:null} : s
  );
}
function paymentsForKey(key){
  return normSettlements().filter(s=>s.key===key);
}
function totalPaidForKey(key, owed){
  return paymentsForKey(key).reduce((sum,s)=>sum+(s.amount!=null?s.amount:owed),0);
}
function settlements(){
  var b=balances(),debt=[],cred=[],res=[];
  Object.entries(b).forEach(([id,v])=>{
    if(v<-0.01)debt.push({id,a:-v});
    else if(v>0.01)cred.push({id,a:v});
  });
  var i=0,j=0;
  while(i<debt.length&&j<cred.length){
    var d=debt[i],c=cred[j],amt=Math.min(d.a,c.a);
    var key=d.id+'-'+c.id;
    var payments=paymentsForKey(key);
    var totalPaid=payments.reduce((sum,s)=>sum+(s.amount!=null?s.amount:amt),0);
    var remaining=Math.max(0,amt-totalPaid);
    res.push({
      from:d.id, to:c.id, amount:amt, key,
      payments,            // array of {key,amount,paidAt}
      totalPaid,
      remaining,
      fullyPaid: remaining<0.01
    });
    d.a-=amt;c.a-=amt;
    if(d.a<0.01)i++;if(c.a<0.01)j++;
  }
  return res;
}
function gname(id){return(db.friends.find(f=>f.id===id)||{name:'?'}).name;}
function upi(n,a){return 'upi://pay?pn='+encodeURIComponent(n)+'&am='+Math.round(a)+'&cu=INR&tn=Pachaax';}
function ctotal(){return Object.values(csplits).reduce((s,v)=>s+(parseFloat(v)||0),0);}

// Dashboard calc helpers (work on arbitrary trip data, not global db)
function tripBalances(t){
  var b={};
  t.friends.forEach(f=>b[f.id]=0);
  t.expenses.forEach(e=>{
    b[e.paidBy]=(b[e.paidBy]||0)+e.amount;
    Object.entries(e.splitAmong||{}).forEach(([id,a])=>b[id]=(b[id]||0)-a);
  });
  return b;
}
function tripSettlementStatus(t){
  var b=tripBalances(t),debt=[],cred=[];
  Object.entries(b).forEach(([id,v])=>{
    if(v<-0.01)debt.push({id,a:-v});
    else if(v>0.01)cred.push({id,a:v});
  });
  var sArr=(t.settlements||[]).map(s=>typeof s==='string'?{key:s,amount:null}:s);
  var i=0,j=0,pending=0;
  while(i<debt.length&&j<cred.length){
    var d=debt[i],c=cred[j],amt=Math.min(d.a,c.a),key=d.id+'-'+c.id;
    var paid=sArr.filter(s=>s.key===key).reduce((sum,s)=>sum+(s.amount!=null?s.amount:amt),0);
    pending+=Math.max(0,amt-paid);
    d.a-=amt;c.a-=amt;
    if(d.a<0.01)i++;if(c.a<0.01)j++;
  }
  return pending;
}

async function doReset(){
  warnConfirm('Delete <strong>all expenses</strong> from this story? Friends will be kept.', async function(){
    // Keep friends, only wipe expenses and settlements
    db={friends:db.friends,expenses:[],settlements:[],meta:db.meta};render();await saveTrip();
  }, 'Reset Expenses');
}
async function doCreateTrip(){
  var n=(document.getElementById('itn')||{value:''}).value.trim();
  var dt=(document.getElementById('itd')||{value:''}).value;
  var bg=parseFloat((document.getElementById('itbg')||{value:''}).value)||0;
  var pu=(document.getElementById('itpu')||{value:''}).value.trim();
  if(!n){toast('Enter a story name!');return;}
  tripId=n.toUpperCase().replace(/\s+/g,'-').replace(/[^A-Z0-9-]/g,'');
  localStorage.setItem('px-trip',tripId);
  var creatorFriend={id:'f'+Date.now(), name:currentUser.displayName};
  db={friends:[creatorFriend],expenses:[],settlements:[],meta:{
    name:n, date:dt, created:new Date().toISOString(),
    createdBy:currentUser?currentUser.email:'', members:[],
    budget:bg, purpose:pu
  }};
  modal=null; dashLoaded=false; tab='friends'; render();
  await fbSet(tripId, db);
}
function doSelectTrip(id){tripId=id;localStorage.setItem('px-trip',id);db={friends:[],expenses:[],settlements:[],meta:{}};modal=null;dashLoaded=false;tab='friends';render();loadTrip();}
function doSwitchTrip(){tripId='';localStorage.removeItem('px-trip');db={friends:[],expenses:[],settlements:[],meta:{}};trips=[];dashLoaded=false;render();loadTrips();}
function calcTotal(){var tot=0;db.friends.forEach(f=>{var el=document.getElementById('cs'+f.id);if(el)tot+=parseFloat(el.value)||0;});var ea=parseFloat((document.getElementById('iea')||{value:'0'}).value)||0;var match=ea>0&&Math.abs(tot-ea)<0.01;var el=document.getElementById('ctot');if(el){el.textContent='₹'+Math.round(tot)+(match?' ✅':ea>0?' (need ₹'+Math.round(ea)+')':'');el.style.color=match?'#16a34a':'#ef4444';}}
function doSetSplit(t){
  db.friends.forEach(f=>{var el=document.getElementById('cs'+f.id);if(el)csplits[f.id]=el.value;});
  var ded=document.getElementById('ied');if(ded)edesc=ded.value;
  var dea=document.getElementById('iea');if(dea)eamt=dea.value;
  var dep=document.getElementById('iep');if(dep)epayer=dep.value;
  var ded2=document.getElementById('iedate');if(ded2)edate=ded2.value;
  var det=document.getElementById('ietime');if(det)etime=det.value;
  var dec=document.getElementById('iecat');if(dec)ecat=dec.value;
  esplit=t;render();setTimeout(()=>{if(t==='custom')calcTotal();},50);
}

// ============ CATEGORY MANAGEMENT (app-level, admin only) ============
const FB_CATS = 'https://pachaax-expenses-default-rtdb.firebaseio.com/app_categories';
var appCategories = [];

async function loadCategories(){
  try{
    var r=await fetch(FB_CATS+'.json');
    var d=r.ok?await r.json():null;
    appCategories=Array.isArray(d)?d:(d?Object.values(d):[]);
  }catch(e){ appCategories=[]; }
}

function getCategories(){ return appCategories; }

async function doAddCategory(){
  var v=(document.getElementById('new-cat')||{value:''}).value.trim();
  if(!v){toast('Enter a category name');return;}
  if(appCategories.includes(v)){toast('Already exists');return;}
  appCategories.push(v);
  await fetch(FB_CATS+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(appCategories)});
  var el=document.getElementById('new-cat'); if(el)el.value='';
  toast('✅ Category added'); render();
}

async function doDelCategory(cat){
  appCategories=appCategories.filter(c=>c!==cat);
  await fetch(FB_CATS+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(appCategories)});
  toast('🗑️ Category removed'); render();
}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>toast('📋 Copied!')).catch(()=>{
    var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 Copied!');
  });
}

// ============ RENDER ============
function render(){
  var root=document.getElementById('root');
  if(!root)return;

  if(!currentUser){
    if(authMode==='otp-verify') { root.innerHTML=otpScreen('verify'); return; }
    if(authMode==='otp-reset')  { root.innerHTML=otpScreen('reset');  return; }
    root.innerHTML=authScreen(); return;
  }
  if(currentUser.banned){root.innerHTML=bannedScreen();return;}
  if(!tripId){root.innerHTML=tripScreen();return;}

  var bal=balances(), sets=settlements();
  var meta=db.meta||{};
  var tripLabel=meta.name||tripId;
  var tripDate=meta.date?new Date(meta.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'';
  var isAdmin=currentUser.role==='admin';
  var owner=isOwner(meta);

  var body='';
  if(tab==='expenses')    body=tabExp(bal);
  else if(tab==='friends')body=tabFr(bal);
  else if(tab==='settle') body=tabSet(bal,sets);
  else if(tab==='dashboard') body=tabDashboard();
  else if(tab==='admin'&&isAdmin) body=tabAdmin();

  var adminTabHtml=isAdmin?`<button class="tab admin-tab ${tab==='admin'?'on':''}" onclick="tab='admin';if(allUsers.length===0)loadAdminData();render()">👑 Admin</button>`:'';

  root.innerHTML=`
  <div class="hdr">
    <div class="hdr-row">
      <div style="min-width:0;flex:1">
        <h1>💰 Expense Track &amp; Settlement</h1>
        <p id="sync">${syncing?'☁️ Syncing...':lastSync?'✅ '+lastSync:''}</p>
        ${tripLabel?`<p style="font-size:11px;color:#fef3c7;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📖 ${tripLabel}${tripDate?' · 📅 '+tripDate:''}${meta.purpose?' · '+meta.purpose:''}</p>`:''}
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        <div style="text-align:right">
          <div style="font-size:11px;font-weight:700;color:#fef3c7;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${currentUser.displayName}</div>
          <div style="font-size:9px;color:rgba(255,255,255,0.6)">${isAdmin?'👑 Admin':'👤 User'}</div>
        </div>
        <button class="rbtn" onclick="loadTrip()" title="Refresh">🔄</button>
        ${owner?`<button class="rbtn" onclick="modal='access';render()" title="Manage Access">🔑</button>`:''}
        <button class="rbtn" onclick="doSwitchTrip()" title="Switch Story">🔀</button>
        <button class="rbtn" onclick="doLogout()" title="Logout">⏏️</button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab ${tab==='expenses'?'on':''}" onclick="tab='expenses';render()">Expenses</button>
    <button class="tab ${tab==='friends'?'on':''}" onclick="tab='friends';render()">Friends (${db.friends.length})</button>
    <button class="tab ${tab==='settle'?'on':''}" onclick="tab='settle';render()">Settle Up</button>
    <button class="tab ${tab==='dashboard'?'on':''}" onclick="tab='dashboard';if(!dashLoading)loadDashboard();render()">📊 Summary</button>
    ${adminTabHtml}
  </div>
  <div class="wrap">${body}</div>
  ${modal==='friend'?mFriend():modal==='markpaid'?mMarkPaid():modal==='expense'?mExpense():modal==='access'?mAccess():''}
  <div class="foot">💡 ${tripId} · Syncs every 10s · ${currentUser.email}</div>`;
}

// ============ OTP SCREEN (verify + reset) ============
function otpScreen(purpose){
  var isVerify=purpose==='verify';
  var email=_otpState?_otpState.email:'';
  var secsLeft=_otpResendCooldown;
  return `<div class="auth-screen">
    <div class="auth-box">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:44px">${isVerify?'📧':'🔑'}</div>
        <h2 style="font-size:19px;font-weight:900;color:#1f2937;margin-top:8px">${isVerify?'Verify Your Email':'Reset Password'}</h2>
        <p style="font-size:12px;color:#6b7280;margin-top:6px;line-height:1.6">
          A 6-digit OTP was sent to<br><strong style="color:#d97706">${email}</strong>.<br>
          <span style="font-size:11px">Check your inbox and spam folder.</span>
        </p>
      </div>
      ${authErr?`<div class="err-box">⚠️ ${authErr}</div>`:''}
      <span class="lbl">Enter OTP</span>
      <input id="otp-box" class="otp-input" type="text" inputmode="numeric" maxlength="6"
        placeholder="000000" autocomplete="one-time-code"
        onkeydown="if(event.key==='Enter')${isVerify?'doVerifyOtp()':'doResetPassword()'}">
      ${!isVerify?`<span class="lbl">New Password</span>
      <input id="ap" class="f" type="password" placeholder="••••••••" autocomplete="new-password">
      <span class="lbl">Confirm Password</span>
      <input id="ap2" class="f" type="password" placeholder="••••••••" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doResetPassword()">`:``}
      <div class="otp-timer"><span id="otp-countdown">${secsLeft>0?'Resend in '+secsLeft+'s':''}</span></div>
      <button class="btn primary" onclick="${isVerify?'doVerifyOtp()':'doResetPassword()'}"
        style="width:100%;padding:13px;font-size:14px;margin-bottom:10px" ${authLoading?'disabled':''}>
        ${authLoading?'⏳ Verifying...':(isVerify?'✅ Verify &amp; Activate':'🔒 Reset Password')}
      </button>
      <button id="otp-resend" class="btn secondary" onclick="doResendOtp()"
        style="width:100%;margin-bottom:12px" ${secsLeft>0?'disabled':''}>
        ${secsLeft>0?'Resend ('+secsLeft+'s)':'📧 Resend OTP'}
      </button>
      <div style="text-align:center">
        <button onclick="clearOtpState();authMode='${isVerify?'register':'forgot'}';authErr='';render()"
          style="background:none;color:#6b7280;font-size:11px;font-weight:600">← Back</button>
      </div>
    </div>
  </div>`;
}

// ============ TABS ============
function tabExp(bal){
  var total=db.expenses.reduce((s,e)=>s+e.amount,0);
  var owner=isOwner(db.meta);
  var meta=db.meta||{};
  var h=`<div class="shd"><h2>All Expenses</h2>
    <div style="display:flex;gap:6px">
      ${owner?`<button class="btn danger sm" onclick="doDeleteCurrentTrip()" title="Delete this story">🗑️ Story</button>`:''}
      <button class="btn primary sm" onclick="editId=null;edesc='';eamt='';epayer='';esplit='equal';csplits={};edate='';etime='';ecat='';modal='expense';render();setTimeout(()=>{var e=document.getElementById('ied');if(e)e.focus();},100)" ${!db.friends.length?'disabled':''}>+ Add</button>
    </div>
  </div>`;
  if(!db.friends.length) return h+`<div class="empty"><p>👥 Add friends first!</p><button class="btn primary" onclick="tab='friends';render()">Go to Friends</button></div>`;
  if(!db.expenses.length) return h+`<div class="empty"><p>💸 No expenses yet!</p></div>`;
  var budget=parseFloat(meta.budget)||0;
  var over=budget>0&&total>budget;
  h+=`<div style="background:linear-gradient(90deg,#d97706,#ea580c);color:white;border-radius:12px;padding:12px 14px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:11px;font-weight:700;opacity:0.85">TOTAL SPENT</div>
      <div style="font-size:11px;opacity:0.7">${db.expenses.length} expense${db.expenses.length!==1?'s':''} · ${db.friends.length} people</div></div>
      <div style="font-size:24px;font-weight:900">₹${Math.round(total).toLocaleString()}</div>
    </div>
    ${budget>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.25)">
      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:5px">
        <span>Budget: ₹${Math.round(budget).toLocaleString()}</span>
        <span style="color:${over?'#fca5a5':'#bbf7d0'}">${over?'⚠️ Over by ₹'+Math.round(total-budget).toLocaleString():'₹'+Math.round(budget-total).toLocaleString()+' remaining'}</span>
      </div>
      <div style="background:rgba(255,255,255,0.25);border-radius:20px;height:6px;overflow:hidden">
        <div style="background:${over?'#ef4444':'#86efac'};height:100%;width:${Math.min(100,Math.round(total/budget*100))}%;border-radius:20px;transition:width 0.3s"></div>
      </div>
    </div>`:''}
  </div>`;
  h+=db.expenses.map(e=>{
    var tags=Object.entries(e.splitAmong).filter(([,a])=>a>0).map(([id,a])=>`<span class="tag">${gname(id)}: ₹${Math.round(a)}</span>`).join('');
    var expDt=e.date?new Date(e.date).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}):'';
    var catBadge=e.category?`<span style="background:#ede9fe;color:#6d28d9;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;margin-left:5px">🏷️ ${e.category}</span>`:'';
    return `<div class="card">
      <div class="row">
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.description}${catBadge}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">
            Paid by <strong style="color:#d97706">${gname(e.paidBy)}</strong>
            ${expDt?`<span style="color:#9ca3af"> · 🕐 ${expDt}</span>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
          <div style="font-size:18px;font-weight:900;color:#d97706">₹${Math.round(e.amount)}</div>
          <button class="ebtn" onclick="doEditExpense('${e.id}')">✏️</button>
          <button class="dbtn" onclick="doDelExpense('${e.id}')">✕</button>
        </div>
      </div>
      <div class="tags">${tags}</div>
    </div>`;
  }).join('');
  return h;
}

function tabFr(bal){
  var creatorName=currentUser.displayName;
  var isOwnerView=(db.meta&&db.meta.createdBy)===currentUser.email||currentUser.role==='admin';
  var h=`<div class="shd"><h2>Your Group</h2>
    <button class="btn primary sm" onclick="fname='';modal='friend';render();setTimeout(()=>{var e=document.getElementById('if');if(e)e.focus();},100)">+ Add</button>
  </div>`;
  if(!db.friends.length) return h+`<div class="empty"><p>👥 Add your travel buddies!</p></div>`;
  h+=db.friends.map(f=>{
    var b=bal[f.id]||0,cls=b>0.01?'pos':b<-0.01?'neg':'zero';
    var txt=b>0.01?`Gets back ₹${Math.round(b)}`:b<-0.01?`Owes ₹${Math.round(-b)}`:'All settled ✓';
    var isCreator=f.name===creatorName&&(db.meta&&db.meta.createdBy)===currentUser.email;
    var hasExp=db.expenses.some(e=>e.paidBy===f.id||Object.keys(e.splitAmong||{}).includes(f.id));
    return `<div class="fc">
      <div class="av">${initials(f.name)}</div>
      <div style="flex:1"><div style="font-weight:900;font-size:15px">${f.name}${isCreator?` <span style="font-size:10px;color:#d97706;font-weight:700">👑 You</span>`:''}</div><div class="${cls}">${txt}</div></div>
      ${isCreator
        ? `<span style="font-size:18px" title="Story creator — cannot be removed">🔒</span>`
        : `<button class="dbtn" onclick="doDelFriend('${f.id}')" title="${hasExp?'Has expenses — remove expenses first':'Remove friend'}" style="font-size:18px;padding:4px 6px">✕</button>`
      }
    </div>`;
  }).join('');
  h+=`<div style="text-align:center;margin-top:12px">
    <button class="btn danger sm" onclick="doReset()">🗑️ Reset All Expenses</button>
    <div style="font-size:10px;color:#9ca3af;margin-top:5px">Friends will not be deleted</div>
  </div>`;
  return h;
}

function tabSet(bal,sets){
  if(!db.friends.length) return `<div class="empty"><p>Add friends first!</p></div>`;
  if(!db.expenses.length) return `<div class="empty"><p>No expenses yet!</p></div>`;

  var pending=sets.filter(s=>!s.fullyPaid);
  var done   =sets.filter(s=> s.fullyPaid);

  // ---- BALANCES ----
  var h=`<div class="btbl"><div style="font-weight:900;font-size:15px;margin-bottom:10px">Current Balances</div>`;
  h+=db.friends.map(f=>{
    var b=bal[f.id]||0,cls=b>0.01?'pos':b<-0.01?'neg':'zero';
    var txt=b>0.01?`+₹${Math.round(b)}`:b<-0.01?`-₹${Math.round(-b)}`:'₹0';
    return `<div class="brow"><span style="font-weight:700">${f.name}</span><span class="${cls}">${txt}</span></div>`;
  }).join('');
  h+=`</div>`;

  // ---- PENDING PAYMENTS ----
  h+=`<div class="gbox" style="margin-bottom:12px">
    <h3>💳 Payments to Make${pending.length?` <span style="background:#ef4444;color:white;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">${pending.length}</span>`:''}</h3>`;

  if(!pending.length){
    h+=`<p style="text-align:center;color:#16a34a;font-weight:700;padding:14px 0">🎉 All settled up!</p>`;
  }else{
    h+=pending.map(s=>{
      var partial=s.totalPaid>0;
      var html=`<div class="sc" style="${partial?'border:2px solid #fde047;background:#fefce8;':''}">
        <div class="srow">
          <div>
            <div style="font-weight:700;font-size:13px">${gname(s.from)} → ${gname(s.to)}</div>
            ${partial?`<div style="font-size:11px;color:#92400e;margin-top:2px">
              Paid so far: <strong>₹${Math.round(s.totalPaid)}</strong> · Remaining: <strong style="color:#ef4444">₹${Math.round(s.remaining)}</strong>
            </div>`:''}
          </div>
          <div style="text-align:right">
            <div style="font-weight:900;font-size:17px;color:${partial?'#d97706':'#16a34a'}">₹${Math.round(s.remaining)}</div>
            ${partial?`<div style="font-size:10px;color:#9ca3af">of ₹${Math.round(s.amount)}</div>`:''}
          </div>
        </div>`;
      // Payment history entries for this pair (partial payments so far)
      if(s.payments.length){
        html+=`<div style="margin-bottom:8px">`;
        s.payments.forEach((p,idx)=>{
          var dt=p.paidAt?new Date(p.paidAt).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}):'—';
          var pAmt=p.amount!=null?p.amount:s.amount;
          html+=`<div class="pay-entry">
            <span style="font-size:16px">💸</span>
            <div style="flex:1">
              <div style="font-weight:700;color:#15803d">₹${Math.round(pAmt)} paid</div>
              <div style="color:#6b7280;font-size:10px">🕐 ${dt}</div>
            </div>
            <button onclick="doRemovePayment('${s.key}',${idx})" style="background:none;color:#ef4444;font-size:13px;padding:2px 5px" title="Remove this payment">✕</button>
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`<div class="sbtns">
        <a href="${upi(gname(s.to),s.remaining)}" class="btn purple sm" style="flex:1">💳 Pay UPI</a>
        <button class="btn green sm" onclick="openMarkPaid('${s.key}',${s.remaining})" style="flex:1">✅ Mark Paid</button>
      </div></div>`;
      return html;
    }).join('');
  }
  h+=`</div>`;

  // ---- COMPLETED PAYMENTS HISTORY ----
  var allPayments=normSettlements();
  if(allPayments.length||done.length){
    // Gather all debt pairs that have any payments (pending or done)
    var allSets=[...pending,...done];
    var histSets=allSets.filter(s=>s.payments.length>0);
    if(done.length||histSets.length){
      h+=`<div style="background:white;border-radius:12px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border:2px solid #e5e7eb">
        <div style="font-size:13px;font-weight:900;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:8px">
          🕐 Payment History
          <span style="background:#f0fdf4;color:#16a34a;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">${allPayments.length} payment${allPayments.length!==1?'s':''}</span>
        </div>`;
      // Show ALL pairs (done + partial-pending) with full payment breakdown
      allSets.filter(s=>s.payments.length>0).forEach(s=>{
        var isFullyPaid=s.fullyPaid;
        h+=`<div style="margin-bottom:12px">
          <div style="font-size:12px;font-weight:800;color:#374151;margin-bottom:5px;display:flex;align-items:center;gap:6px">
            ${isFullyPaid?'<span style="background:#dcfce7;color:#16a34a;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:800">✓ Fully Settled</span>':'<span style="background:#fef9c3;color:#92400e;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:800">⚡ Partial</span>'}
            ${gname(s.from)} → ${gname(s.to)}
            <span style="color:#9ca3af;font-weight:600;font-size:11px">(Total: ₹${Math.round(s.amount)})</span>
          </div>`;
        s.payments.forEach((p,idx)=>{
          var dt=p.paidAt?new Date(p.paidAt).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}):'—';
          var pAmt=p.amount!=null?p.amount:s.amount;
          h+=`<div class="pay-entry ${isFullyPaid?'':'partial'}">
            <span style="font-size:15px">💸</span>
            <div style="flex:1">
              <div style="font-weight:700;color:${isFullyPaid?'#15803d':'#92400e'}">₹${Math.round(pAmt)} paid</div>
              <div style="color:#6b7280;font-size:10px">🕐 ${dt}</div>
            </div>
            <button onclick="doRemovePayment('${s.key}',${idx})" style="background:#fef9c3;color:#92400e;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700" title="Re-enable / undo this payment">↩️ Undo</button>
          </div>`;
        });
        if(isFullyPaid){
          h+=`<button class="btn sm" style="background:#fef9c3;color:#92400e;width:100%;margin-top:4px;font-weight:700" onclick="doRemovePayment('${s.key}',${s.payments.length-1})">↩️ Re-enable Last Payment</button>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }
  }

  return h;
}

// ============ DASHBOARD TAB ============
function tabDashboard(){
  if(dashLoading) return `<div class="empty"><p>⏳ Loading summary…</p><p style="color:#9ca3af;font-size:11px;margin-top:6px">Fetching all stories in one request</p></div>`;
  if(!dashLoaded) return `<div class="empty"><p>📊 Loading summary...</p></div>`;
  if(!dashData.length) return `<div class="empty"><p>No trips found. Create one to get started!</p></div>`;

  // Grand totals across all trips
  var grandTotal=0, grandExp=0, grandPending=0, grandTrips=dashData.length;
  dashData.forEach(t=>{
    var tot=t.expenses.reduce((s,e)=>s+e.amount,0);
    grandTotal+=tot; grandExp+=t.expenses.length;
    grandPending+=tripSettlementStatus(t);
  });

  var h=`
  <div class="dash-summary-bar">
    <div style="font-size:11px;font-weight:700;opacity:0.8;text-transform:uppercase;margin-bottom:8px">
      📊 Your Overall Summary
    </div>
    <div class="dash-grid">
      <div class="dash-stat"><div class="n">${grandTrips}</div><div class="l">Stories</div></div>
      <div class="dash-stat"><div class="n">${grandExp}</div><div class="l">Expenses</div></div>
      <div class="dash-stat"><div class="n">₹${Math.round(grandTotal).toLocaleString()}</div><div class="l">Total Spent</div></div>
      <div class="dash-stat"><div class="n" style="color:${grandPending>0?'#fbbf24':'#86efac'}">₹${Math.round(grandPending).toLocaleString()}</div><div class="l">Pending</div></div>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:12px;font-weight:800;color:#6b7280;text-transform:uppercase">Story Breakdown</div>
    <button class="btn secondary sm" onclick="dashLoaded=false;loadDashboard()">🔄 Refresh</button>
  </div>`;

  dashData.forEach(t=>{
    var total=t.expenses.reduce((s,e)=>s+e.amount,0);
    var pending=tripSettlementStatus(t);
    var settled=pending<0.01;
    var bal=tripBalances(t);
    var dateStr=t.date?new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'';
    var isActive=t.id===tripId;
    // Find the current user's friend entry by matching display name
    var myFriend=t.friends.find(f=>f.name===currentUser.displayName);
    var myBal=myFriend?(bal[myFriend.id]||0):null;
    var myBalHtml='';
    if(myFriend){
      if(myBal>0.01) myBalHtml=`<span style="color:#16a34a;font-weight:700;font-size:12px">You get back ₹${Math.round(myBal)}</span>`;
      else if(myBal<-0.01) myBalHtml=`<span style="color:#ef4444;font-weight:700;font-size:12px">You owe ₹${Math.round(-myBal)}</span>`;
      else myBalHtml=`<span style="color:#16a34a;font-weight:700;font-size:12px">✓ You're settled</span>`;
    }

    // Top 3 expenses
    var topExp=[...t.expenses].sort((a,b)=>b.amount-a.amount).slice(0,3);
    var topHtml=topExp.map(e=>{
      var dt=e.date?new Date(e.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px">
        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px;color:#374151">${e.description}</div>
        <div style="flex-shrink:0;color:#6b7280">${dt}</div>
        <div style="flex-shrink:0;font-weight:700;color:#d97706;margin-left:8px">₹${Math.round(e.amount)}</div>
      </div>`;
    }).join('');

    h+=`<div class="dash-card ${isActive?'active-trip':''}" onclick="doSelectTrip('${t.id}');render()">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
        <div style="min-width:0">
          <div style="font-weight:900;font-size:15px;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${isActive?'📍 ':'📖 '}${t.name}
          </div>
          ${t.meta&&t.meta.purpose?`<div style="font-size:11px;color:#7c3aed;font-weight:600;margin-top:2px">📌 ${t.meta.purpose}</div>`:''}
          <div style="font-size:11px;color:#9ca3af;margin-top:2px">${dateStr?'📅 '+dateStr:''} · ${t.friends.length} people · ${t.expenses.length} expenses</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:900;color:#d97706">₹${Math.round(total).toLocaleString()}</div>
          <span class="dash-pill ${settled?'dash-settled':'dash-pending'}">${settled?'✓ Settled':'⏳ Pending'}</span>
        </div>
      </div>
      ${t.meta&&t.meta.budget>0?(()=>{
        var bg=parseFloat(t.meta.budget)||0;
        var over=total>bg;
        var pct=Math.min(100,Math.round(total/bg*100));
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:4px">
            <span style="color:#6b7280">Budget ₹${Math.round(bg).toLocaleString()}</span>
            <span style="color:${over?'#ef4444':'#16a34a'}">${over?'⚠️ Over by ₹'+Math.round(total-bg).toLocaleString():'₹'+Math.round(bg-total).toLocaleString()+' left ('+pct+'%)'}</span>
          </div>
          <div style="background:#f3f4f6;border-radius:20px;height:7px;overflow:hidden">
            <div style="background:${over?'#ef4444':'#d97706'};height:100%;width:${pct}%;border-radius:20px"></div>
          </div>
        </div>`;
      })():''}
      ${myBalHtml?`<div style="margin-bottom:10px">${myBalHtml}</div>`:''}
      ${topExp.length?`
      <div style="border-top:2px solid #f3f4f6;padding-top:8px">
        <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;margin-bottom:4px">Top Expenses</div>
        ${topHtml}
        ${t.expenses.length>3?`<div style="font-size:11px;color:#9ca3af;margin-top:4px">+${t.expenses.length-3} more</div>`:''}
      </div>`:''}
      ${!settled&&pending>0?`<div style="margin-top:10px;background:#fef2f2;border-radius:8px;padding:8px 10px;font-size:12px;color:#b91c1c;font-weight:600">
        💳 ₹${Math.round(pending)} pending settlement
      </div>`:''}
    </div>`;
  });

  return h;
}

// ============ ADMIN TAB ============
function tabAdmin(){
  var bannedCount=allUsers.filter(u=>u.banned).length;
  var h=`<div class="admin-hdr">
    <div>
      <div style="font-size:11px;font-weight:700;opacity:0.8;text-transform:uppercase">Admin Dashboard</div>
      <div style="font-size:20px;font-weight:900;margin-top:2px">👑 Super User Panel</div>
    </div>
    <button class="btn sm" style="background:rgba(255,255,255,0.2);color:white;font-size:11px" onclick="loadAdminData()">🔄 Refresh</button>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="num">${allUsers.length}</div><div class="lbl2">Users</div></div>
    <div class="stat-box"><div class="num">${bannedCount}</div><div class="lbl2">Banned</div></div>
    <div class="stat-box"><div class="num">${allTrips.length}</div><div class="lbl2">Stories</div></div>
  </div>
  <div style="display:flex;background:white;border-radius:10px;padding:3px;gap:3px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.08);flex-wrap:wrap">
    <button class="btn sm ${adminSubTab==='users'?'purple':'secondary'}" onclick="adminSubTab='users';render()" style="flex:1;min-width:80px">👥 Users (${allUsers.length})</button>
    <button class="btn sm ${adminSubTab==='trips'?'purple':'secondary'}" onclick="adminSubTab='trips';render()" style="flex:1;min-width:80px">📖 Stories (${allTrips.length})</button>
    <button class="btn sm ${adminSubTab==='categories'?'purple':'secondary'}" onclick="adminSubTab='categories';loadCategories().then(render)" style="flex:1;min-width:80px">🏷️ Categories</button>
  </div>`;

  if(adminSubTab==='users'){
    if(!allUsers.length) h+=`<div class="empty"><p>No users. Click Refresh.</p></div>`;
    else {
      var unverified=allUsers.filter(u=>!u.verified&&!u.banned);
      var active    =allUsers.filter(u=> u.verified&&!u.banned);
      var banned    =allUsers.filter(u=> u.banned);

      // ---- UNVERIFIED (pending email OTP) ----
      if(unverified.length){
        h+=`<div style="background:linear-gradient(135deg,#fef9c3,#fef3c7);border:2px solid #fbbf24;border-radius:12px;padding:12px 14px;margin-bottom:12px">
          <div style="font-size:12px;font-weight:800;color:#92400e;margin-bottom:10px;display:flex;align-items:center;gap:6px">
            <span style="background:#ef4444;color:white;border-radius:20px;padding:2px 8px;font-size:11px">${unverified.length}</span>
            PENDING EMAIL VERIFICATION
          </div>`;
        h+=unverified.map(u=>`
          <div style="background:white;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)">
            <div class="av" style="width:36px;height:36px;font-size:14px">${initials(u.displayName||u.email)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:800;font-size:13px">${u.displayName||'—'}</div>
              <div style="font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.email}</div>
              <div style="font-size:10px;color:#9ca3af;margin-top:2px">Registered: ${u.createdAt?new Date(u.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'-'}</div>
            </div>
            <div style="display:flex;gap:5px;flex-shrink:0">
              <button class="btn green sm" onclick="doApproveUser('${u.username}')" title="Manually verify this user">✅ Verify</button>
              <button class="btn danger sm" onclick="doRejectUser('${u.username}')">✗ Delete</button>
            </div>
          </div>`).join('');
        h+=`</div>`;
      }

      // ---- ACTIVE USERS ----
      if(active.length){
        h+=`<div style="font-size:11px;font-weight:800;color:#6b7280;text-transform:uppercase;margin-bottom:8px">Active Users (${active.length})</div>`;
        h+=active.map(u=>{
          var isMe=u.email===currentUser.email;
          var roleB=u.role==='admin'?`<span class="badge badge-admin">👑 Admin</span>`:`<span class="badge badge-user">👤 User</span>`;
          return `<div class="user-card">
            <div class="av ${u.role==='admin'?'admin-av':''}">${initials(u.displayName||u.email)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:900;font-size:14px">${u.displayName||'—'} ${isMe?'<span style="font-size:10px;color:#d97706">(you)</span>':''}</div>
              <div style="font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.email}</div>
              <div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">${roleB}</div>
            </div>
            ${!isMe?`<div class="user-actions">
              <button class="btn danger sm" onclick="doBanUser('${u.username}',true)">🚫 Ban</button>
              ${u.role!=='admin'?`<button class="btn sm" style="background:#f5f3ff;color:#6d28d9" onclick="doPromoteUser('${u.username}')">👑</button>`:''}
              <button class="btn danger sm" onclick="doDeleteUser('${u.username}')">🗑️</button>
            </div>`:'<div style="color:#9ca3af;font-size:11px">You</div>'}
          </div>`;
        }).join('');
      }

      // ---- BANNED ----
      if(banned.length){
        h+=`<div style="font-size:11px;font-weight:800;color:#6b7280;text-transform:uppercase;margin:12px 0 8px">Banned (${banned.length})</div>`;
        h+=banned.map(u=>`
          <div class="user-card banned">
            <div class="av">${initials(u.displayName||u.email)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:900;font-size:14px">${u.displayName||'—'}</div>
              <div style="font-size:11px;color:#6b7280">${u.email}</div>
              <span class="badge badge-banned">🚫 Banned</span>
            </div>
            <div class="user-actions">
              <button class="btn green sm" onclick="doBanUser('${u.username}',false)">✅ Unban</button>
              <button class="btn danger sm" onclick="doDeleteUser('${u.username}')">🗑️</button>
            </div>
          </div>`).join('');
      }
    }
  } else if(adminSubTab==='trips'){
    if(!allTrips.length) h+=`<div class="empty"><p>No stories. Click Refresh.</p></div>`;
    else h+=allTrips.map(t=>{
      var dateStr=t.date?new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';
      return `<div class="trip-admin-card">
        <div style="min-width:0;flex:1">
          <div style="font-weight:900;font-size:14px;color:#1f2937">${t.name}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">🏷️ ${t.id} · 📅 ${dateStr}</div>
          ${t.createdBy?`<div style="font-size:10px;color:#9ca3af;margin-top:1px">Owner: ${t.createdBy}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          ${tripId===t.id?`<span style="font-size:10px;font-weight:700;color:#16a34a">● NOW</span>`:''}
          <button class="btn sm secondary" onclick="doSelectTrip('${t.id}')">Open</button>
          <button class="btn danger sm" onclick="doAdminDeleteTrip('${t.id}')">🗑️</button>
        </div>
      </div>`;
    }).join('');
  } else if(adminSubTab==='categories'){
    var cats=getCategories();
    h+=`<div style="background:white;border-radius:12px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,0.07)">
      <div style="font-size:13px;font-weight:800;color:#374151;margin-bottom:4px">🏷️ Expense Categories</div>
      <div style="font-size:11px;color:#6b7280;margin-bottom:14px;line-height:1.5">
        These categories are available to <strong>all users</strong> across every story when tagging an expense.
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input id="new-cat" class="f" type="text" placeholder="e.g. Food, Hotel, Transport, Activities" style="margin:0;flex:1"
          onkeydown="if(event.key==='Enter')doAddCategory()">
        <button class="btn primary sm" onclick="doAddCategory()">+ Add</button>
      </div>
      ${cats.length
        ? cats.map(c=>`
          <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f9fafb;border-radius:9px;margin-bottom:7px;border:2px solid #e5e7eb">
            <span style="background:#ede9fe;color:#6d28d9;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700">🏷️ ${c}</span>
            <span style="flex:1"></span>
            <button class="btn danger sm" onclick="doDelCategory('${c}')">🗑️ Remove</button>
          </div>`).join('')
        : `<div class="empty" style="padding:20px"><p>No categories yet.<br>Add your first category above!</p></div>`
      }
    </div>`;
  }
  return h;
}

  </div>`;
}

function mMarkPaid(){
  var sets=settlements();
  var s=sets.find(x=>x.key===_mpKey);
  var owed=s?s.remaining:_mpOwed;
  return `<div class="overlay" onclick="modal=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>💸 Record Payment</h3>
      ${s?`<div style="background:#f0fdf4;border-radius:9px;padding:10px 12px;margin-bottom:12px;font-size:13px">
        <div style="font-weight:700;color:#374151">${gname(s.from)} → ${gname(s.to)}</div>
        <div style="color:#6b7280;margin-top:2px">
          Total owed: <strong>₹${Math.round(s.amount)}</strong>
          ${s.totalPaid>0?` · Paid so far: <strong style="color:#16a34a">₹${Math.round(s.totalPaid)}</strong>`:''}
        </div>
        <div style="font-size:12px;font-weight:700;color:#ef4444;margin-top:2px">Remaining: ₹${Math.round(owed)}</div>
      </div>`:''}
      <span class="lbl">Amount Being Paid Now (₹)</span>
      <input id="mp-amt" class="f" type="number" inputmode="decimal" placeholder="0"
        oninput="(function(){var v=parseFloat(document.getElementById('mp-amt').value)||0;var d=document.getElementById('mp-diff');if(!d)return;var diff=${owed}-v;if(v<=0){d.textContent='';return;}if(Math.abs(diff)<0.01){d.innerHTML='<span style=\\'color:#16a34a;font-weight:700\\'>✅ Fully settled</span>';}else if(diff>0){d.innerHTML='<span style=\\'color:#d97706;font-weight:700\\'>⚠️ Still remaining: ₹'+Math.round(diff)+'</span>';}else{d.innerHTML='<span style=\\'color:#7c3aed;font-weight:700\\'>ℹ️ Overpaying by ₹'+Math.round(-diff)+'</span>';}})()"
        onkeydown="if(event.key==='Enter')doMarkPaid()">
      <div id="mp-diff" style="font-size:12px;color:#6b7280;margin:-4px 0 10px;min-height:18px"></div>
      <div class="mbtns">
        <button class="btn secondary" onclick="modal=null;render()">Cancel</button>
        <button class="btn green" onclick="doMarkPaid()">✅ Record Payment</button>
      </div>
    </div>
  </div>`;
}

function mExpense(){
  var opts=db.friends.map(f=>`<option value="${f.id}" ${epayer===f.id?'selected':''}>${f.name}</option>`).join('');
  var isEdit=!!editId;
  var nowDate=new Date();
  var defDate=edate||nowDate.toISOString().split('T')[0];
  var defTime=etime||nowDate.toTimeString().slice(0,5);
  var cats=getCategories();
  var catOpts=cats.map(c=>`<option value="${c}" ${ecat===c?'selected':''}>${c}</option>`).join('');
  var cbox=esplit==='custom'?`
    <div class="cbox">
      <div style="font-size:11px;font-weight:700;color:#6b7280;margin-bottom:7px">AMOUNT PER PERSON:</div>
      ${db.friends.map(f=>`
      <div class="crow">
        <span>${f.name}</span>
        <input id="cs${f.id}" class="ci" type="number" inputmode="decimal" placeholder="0" value="${csplits[f.id]||''}" oninput="calcTotal()">
      </div>`).join('')}
      <div class="ctot">
        <span style="font-weight:700">Total:</span>
        <span id="ctot" style="font-weight:900;color:#ef4444">₹0</span>
      </div>
    </div>`:'';
  return `<div class="overlay" onclick="modal=null;editId=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>${isEdit?'✏️ Edit Expense':'💸 Add Expense'}</h3>
      <span class="lbl">Description</span>
      <input id="ied" class="f" type="text" placeholder="e.g. Dinner, Hotel" autocomplete="off" value="${edesc}">
      <span class="lbl">Amount (₹)</span>
      <input id="iea" class="f" type="number" inputmode="decimal" placeholder="0" value="${eamt}" oninput="calcTotal()">
      <span class="lbl">Who Paid?</span>
      <select id="iep" class="f"><option value="">Select person</option>${opts}</select>
      <span class="lbl">Category</span>
      <select id="iecat" class="f">
        <option value="">— No category —</option>
        ${catOpts}
      </select>
      ${!cats.length&&currentUser.role==='admin'?`<p style="font-size:11px;color:#9ca3af;margin:-4px 0 8px">No categories yet. Add them in 👑 Admin → Categories.</p>`:''}
      ${!cats.length&&currentUser.role!=='admin'?`<p style="font-size:11px;color:#9ca3af;margin:-4px 0 8px">Ask your admin to add categories.</p>`:''}
      <div style="display:flex;gap:8px">
        <div style="flex:1">
          <span class="lbl">Date</span>
          <input id="iedate" class="f" type="date" value="${defDate}">
        </div>
        <div style="flex:1">
          <span class="lbl">Time</span>
          <input id="ietime" class="f" type="time" value="${defTime}">
        </div>
      </div>
      <span class="lbl">Split Type</span>
      <div class="stgl">
        <button class="btn sm ${esplit==='equal'?'primary':'secondary'}" onclick="doSetSplit('equal')">⚖️ Equal</button>
        <button class="btn sm ${esplit==='custom'?'primary':'secondary'}" onclick="doSetSplit('custom')">✏️ Custom</button>
      </div>
      ${cbox}
      <div class="mbtns">
        <button class="btn secondary" onclick="modal=null;editId=null;render()">Cancel</button>
        <button class="btn primary" onclick="doAddExpense()">${isEdit?'💾 Save':'➕ Add Expense'}</button>
      </div>
    </div>
  </div>`;
}

function mAccess(){
  var meta=db.meta||{};
  var members=meta.members||[];
  var memberList=members.length
    ?members.map(m=>`<div class="member-row">
        <div class="av" style="width:32px;height:32px;font-size:13px">${initials(m)}</div>
        <span>${m}</span>
        <button class="btn danger sm" onclick="doRevokeAccess('${m}')">Remove</button>
      </div>`).join('')
    :`<p style="font-size:12px;color:#9ca3af;text-align:center;padding:10px 0">No members yet.</p>`;
  return `<div class="overlay" onclick="modal=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>🔑 Manage Story Access</h3>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px">Trip: <strong>${meta.name||tripId}</strong> · Owner: you</div>
      <span class="lbl">Add Member by Email</span>
      <div style="display:flex;gap:7px;margin-bottom:14px">
        <input id="access-email" class="f" type="email" placeholder="friend@example.com" style="margin:0;flex:1" onkeydown="if(event.key==='Enter')doGrantAccess()">
        <button class="btn primary sm" onclick="doGrantAccess()">Grant</button>
      </div>
      <span class="lbl">Current Members</span>
      ${memberList}
      <div class="mbtns" style="margin-top:14px">
        <button class="btn secondary" onclick="modal=null;render()">Close</button>
      </div>
    </div>
  </div>`;
}

// ============ INIT ============
(function init(){
  initEJS();
  // Restore OTP screen if user closed browser mid-verification/reset
  if(!currentUser && _otpState){
    authMode = _otpState.purpose==='verify' ? 'otp-verify' : 'otp-reset';
    startResendTimer();
  }
  render();
  if(currentUser){
    loadCategories(); // load app-level categories for all users
    if(tripId) loadTrip(); else loadTrips();
  }
})();
</script>
</body>
</html>
