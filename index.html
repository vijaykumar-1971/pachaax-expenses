<style>

.trip-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:linear-gradient(135deg,#fff7ed,#fef3c7)}

.auth-tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:18px;gap:3px}
.auth-tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;background:none;color:#6b7280;text-align:center}
.auth-tab.on{background:white;color:#92400e;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.err-box{background:#fef2f2;border:2px solid #fca5a5;border-radius:9px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#b91c1c;font-weight:600}

/* ADMIN */
.admin-hdr{background:linear-gradient(90deg,#7c3aed,#4f46e5);color:white;border-radius:12px;padding:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.user-card{background:white;border-radius:12px;padding:14px;margin-bottom:9px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border:2px solid #e5e7eb;display:flex;align-items:center;gap:10px}
.user-card.banned{border-color:#fca5a5;background:#fef2f2;opacity:0.8}

.trip-admin-card{background:white;border-radius:12px;padding:12px 14px;margin-bottom:9px;box-shadow:0 2px 6px rgba(0,0,0,0.07);border:2px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.banned-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:#fef2f2}
.banned-box{background:white;border-radius:18px;padding:28px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.1);border:2px solid #fca5a5}
.stat-box{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:12px;padding:14px;text-align:center;border:2px solid #ddd6fe}
.stat-box .num{font-size:28px;font-weight:900;color:#6d28d9}
.stat-box .lbl2{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-top:2px}

/* PERMISSIONS */

.member-row span{flex:1;font-size:13px;font-weight:600;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* VERIFY */
.verify-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;background:linear-gradient(135deg,#eff6ff,#f0fdf4)}
.verify-box{background:white;border-radius:18px;padding:28px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.1);text-align:center}
.copy-link{background:#f9fafb;border:2px solid #e5e7eb;border-radius:9px;padding:10px;font-size:11px;color:#374151;word-break:break-all;margin:10px 0;text-align:left;cursor:pointer}
.copy-link:hover{background:#fef3c7;border-color:#d97706}

<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
// ============ CONFIG ============
const FB      = 'https://pachaax-expenses-default-rtdb.firebaseio.com/trips';
const FB_AUTH = 'https://pachaax-expenses-default-rtdb.firebaseio.com/users';

// ============ EMAILJS CONFIG ============
// 1. Sign up free at https://emailjs.com
// 2. Add an Email Service (Gmail, Outlook, etc.) → copy the Service ID
// 3. Create two Email Templates (see comments below) → copy their Template IDs
// 4. Go to Account → Public Key → copy it here
const EJS = {
  publicKey:          'YOUR_PUBLIC_KEY',       // EmailJS account public key
  serviceId:          'YOUR_SERVICE_ID',        // e.g. 'service_abc123'
  verifyTemplateId:   'YOUR_VERIFY_TEMPLATE',   // template for email verification
  resetTemplateId:    'YOUR_RESET_TEMPLATE',    // template for password reset
};
// ---- TEMPLATE VARIABLES (use these in your EmailJS templates) ----
// Verification template variables: {{to_email}}, {{to_name}}, {{verify_link}}, {{app_name}}
// Reset template      variables: {{to_email}}, {{to_name}}, {{reset_link}},  {{app_name}}
let ejsReady = false;
function initEJS(){
  if(!EJS.publicKey||EJS.publicKey==='YOUR_PUBLIC_KEY'){ return; }
  try{ emailjs.init({publicKey: EJS.publicKey}); ejsReady=true; }
  catch(e){ console.warn('EmailJS init failed',e); }
}

async function sendEmail(templateId, toEmail, toName, link){
  if(!ejsReady){
    console.warn('EmailJS not configured — email not sent.');
    return false;
  }
  try{
    await emailjs.send(EJS.serviceId, templateId, {
      to_email:    toEmail,
      to_name:     toName,
      verify_link: link,   // used by verify template
      reset_link:  link,   // used by reset template
      app_name:    'Expense Track & Settlement',
    });
    return true;
  }catch(e){
    console.error('EmailJS send error', e);
    return false;
  }
}

// ============ HELPERS ============
// Firebase keys cannot contain '.' — encode emails
function eKey(email){ return email.toLowerCase().replace(/\./g,'__'); }
function eFromKey(k){ return k.replace(/__/g,'.'); }
function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function genToken(){ return Array.from(crypto.getRandomValues(new Uint8Array(24))).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function initials(s){ return (s||'?')[0].toUpperCase(); }

// ============ STATE ============
let tripId      = localStorage.getItem('px-trip') || '';
let db          = { friends:[], expenses:[], settlements:[], meta:{} };
let trips       = [];
let tab         = 'expenses';
let syncing     = false;
let lastSync    = '';
let modal       = null; // null | 'friend' | 'expense' | 'access'
let editId      = null;
let fname='', edesc='', eamt='', epayer='', esplit='equal', csplits={};

// --- AUTH ---
let currentUser  = JSON.parse(localStorage.getItem('px-user') || 'null');
let authMode     = 'login';   // 'login' | 'register' | 'forgot' | 'reset'
let authErr      = '';
let authOk       = '';
let authLoading  = false;
let adminSubTab  = 'users';
let allUsers     = [];
let allTrips     = [];
// pending verification: { email, token }
let pendingVerify = JSON.parse(localStorage.getItem('px-pending-verify') || 'null');
// reset flow
let resetTokenLocal = ''; // token for reset (loaded from URL)
let resetEmailLocal = ''; // email for reset (loaded from URL)

// ============ TOAST ============
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ============ HASH ============
async function hashPwd(pwd){
  var enc=new TextEncoder().encode(pwd);
  var buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ============ FIREBASE ============
function url(path)  { return FB+'/'+path+'.json'; }
function aurl(path) { return FB_AUTH+'/'+path+'.json'; }
async function fbGet(path)       { var r=await fetch(url(path)); return r.ok?r.json():null; }
async function fbSet(path,data)  { var r=await fetch(url(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.ok; }
async function fbDel(path)       { var r=await fetch(url(path),{method:'DELETE'}); return r.ok; }
async function faGet(path)       { var r=await fetch(aurl(path)); return r.ok?r.json():null; }
async function faSet(path,data)  { var r=await fetch(aurl(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.ok; }
async function faDel(path)       { var r=await fetch(aurl(path),{method:'DELETE'}); return r.ok; }

// ============ AUTH ACTIONS ============
async function doLogin(){
  var u=(document.getElementById('au')||{value:''}).value.trim().toLowerCase();
  var p=(document.getElementById('ap')||{value:''}).value;
  authErr=''; authOk=''; authLoading=true; render();
  if(!u||!p){authErr='Please fill all fields.';authLoading=false;render();return;}
  if(!isEmail(u)){authErr='Enter a valid email address.';authLoading=false;render();return;}
  try{
    var rec=await faGet(eKey(u));
    if(!rec){authErr='No account found. Please register.';authLoading=false;render();return;}
    if(!rec.verified){authErr='Email not verified. Check your verification link below.';authLoading=false;pendingVerify={email:u,token:rec.verifyToken};localStorage.setItem('px-pending-verify',JSON.stringify(pendingVerify));render();return;}
    if(rec.banned){authErr='Your account has been banned by an admin.';authLoading=false;render();return;}
    var h=await hashPwd(p);
    if(h!==rec.passwordHash){authErr='Incorrect password.';authLoading=false;render();return;}
    currentUser={email:u,role:rec.role||'user',displayName:rec.displayName||u};
    localStorage.setItem('px-user',JSON.stringify(currentUser));
    pendingVerify=null; localStorage.removeItem('px-pending-verify');
    authErr=''; authLoading=false;
    toast('👋 Welcome back, '+currentUser.displayName+'!');
    render(); loadTrips();
  }catch(e){authErr='Connection error. Please try again.';authLoading=false;render();}
}

async function doRegister(){
  var u=(document.getElementById('au')||{value:''}).value.trim().toLowerCase();
  var dn=(document.getElementById('adn')||{value:''}).value.trim();
  var p=(document.getElementById('ap')||{value:''}).value;
  var p2=(document.getElementById('ap2')||{value:''}).value;
  authErr=''; authOk=''; authLoading=true; render();
  if(!u||!dn||!p||!p2){authErr='Please fill all fields.';authLoading=false;render();return;}
  if(!isEmail(u)){authErr='Username must be a valid email address.';authLoading=false;render();return;}
  if(p.length<6){authErr='Password must be at least 6 characters.';authLoading=false;render();return;}
  if(p!==p2){authErr='Passwords do not match.';authLoading=false;render();return;}
  try{
    var existing=await faGet(eKey(u));
    if(existing){authErr='An account with this email already exists.';authLoading=false;render();return;}
    var allR=await fetch(FB_AUTH+'.json?shallow=true'); var allD=await allR.json();
    var isFirst=!allD||Object.keys(allD).length===0;
    var h=await hashPwd(p);
    var vToken=genToken();
    await faSet(eKey(u),{passwordHash:h,role:isFirst?'admin':'user',displayName:dn,banned:false,verified:false,verifyToken:vToken,createdAt:new Date().toISOString()});
    var vLink=window.location.origin+window.location.pathname+'?verify='+encodeURIComponent(u)+'&token='+vToken;
    var emailSent=await sendEmail(EJS.verifyTemplateId, u, dn, vLink);
    pendingVerify={email:u,token:vToken,emailSent};
    localStorage.setItem('px-pending-verify',JSON.stringify(pendingVerify));
    authErr=''; authLoading=false; authMode='login';
    render();
  }catch(e){authErr='Connection error. Please try again.';authLoading=false;render();}
}

async function doVerify(email,token){
  try{
    var rec=await faGet(eKey(email));
    if(!rec){toast('⚠️ Account not found');return;}
    if(rec.verifyToken!==token){toast('⚠️ Invalid or expired verification link.');return;}
    rec.verified=true; rec.verifyToken='';
    await faSet(eKey(email),rec);
    pendingVerify=null; localStorage.removeItem('px-pending-verify');
    // clean URL
    window.history.replaceState({},'',window.location.pathname);
    authOk='✅ Email verified! You can now log in.';
    authMode='login'; authErr=''; render();
  }catch(e){toast('⚠️ Verification failed. Try again.');}
}

async function doForgotPassword(){
  var u=(document.getElementById('au')||{value:''}).value.trim().toLowerCase();
  authErr=''; authOk=''; authLoading=true; render();
  if(!u){authErr='Enter your email address.';authLoading=false;render();return;}
  if(!isEmail(u)){authErr='Enter a valid email address.';authLoading=false;render();return;}
  try{
    var rec=await faGet(eKey(u));
    if(!rec){authErr='No account with this email.';authLoading=false;render();return;}
    var rToken=genToken();
    rec.resetToken=rToken; rec.resetAt=Date.now();
    await faSet(eKey(u),rec);
    var rLink=window.location.origin+window.location.pathname+'?reset='+encodeURIComponent(u)+'&rtoken='+rToken;
    var emailSent=await sendEmail(EJS.resetTemplateId, u, rec.displayName||u, rLink);
    authLoading=false;
    pendingVerify={email:u,token:null,resetToken:rToken,isReset:true,emailSent};
    render();
  }catch(e){authErr='Connection error. Try again.';authLoading=false;render();}
}

async function doResetPassword(){
  var np=(document.getElementById('ap')||{value:''}).value;
  var np2=(document.getElementById('ap2')||{value:''}).value;
  authErr=''; authLoading=true; render();
  if(!np||!np2){authErr='Please fill all fields.';authLoading=false;render();return;}
  if(np.length<6){authErr='Password must be at least 6 characters.';authLoading=false;render();return;}
  if(np!==np2){authErr='Passwords do not match.';authLoading=false;render();return;}
  try{
    var rec=await faGet(eKey(resetEmailLocal));
    if(!rec||rec.resetToken!==resetTokenLocal){authErr='Invalid or expired reset link.';authLoading=false;render();return;}
    // tokens expire after 1 hour
    if(Date.now()-rec.resetAt>3600000){authErr='Reset link expired. Request a new one.';authLoading=false;render();return;}
    rec.passwordHash=await hashPwd(np); rec.resetToken=''; rec.resetAt=0;
    await faSet(eKey(resetEmailLocal),rec);
    resetTokenLocal=''; resetEmailLocal='';
    window.history.replaceState({},'',window.location.pathname);
    authOk='✅ Password reset! Please log in.'; authMode='login'; authErr=''; authLoading=false;
    render();
  }catch(e){authErr='Connection error. Try again.';authLoading=false;render();}
}

function doLogout(){
  if(!confirm('Log out?'))return;
  currentUser=null; localStorage.removeItem('px-user');
  tripId=''; localStorage.removeItem('px-trip');
  db={friends:[],expenses:[],settlements:[],meta:{}}; trips=[]; authMode='login'; authErr=''; authOk=''; render();
}

// ============ TRIP PERMISSIONS ============
function canSeeTrip(meta){
  if(!meta) return false;
  if(currentUser.role==='admin') return true;
  if((meta.createdBy||'')===currentUser.email) return true;
  var members=meta.members||[];
  return members.indexOf(currentUser.email)!==-1;
}

function isOwner(meta){
  if(!meta) return false;
  if(currentUser.role==='admin') return true;
  return (meta.createdBy||'')===currentUser.email;
}

async function doDeleteCurrentTrip(){
  if(!isOwner(db.meta)){toast('Only the trip owner can delete this trip.');return;}
  if(!confirm('Delete trip "'+( db.meta.name||tripId)+'"? All data will be lost!'))return;
  try{
    await fbDel(tripId);
    tripId=''; localStorage.removeItem('px-trip');
    db={friends:[],expenses:[],settlements:[],meta:{}}; trips=[];
    toast('🗑️ Trip deleted'); render(); loadTrips();

async function doGrantAccess(){
  var email=(document.getElementById('access-email')||{value:''}).value.trim().toLowerCase();
  if(!email){toast('Enter an email');return;}
  if(!isEmail(email)){toast('Invalid email');return;}
  if(email===currentUser.email){toast('That\'s you!');return;}
  try{
    var rec=await faGet(eKey(email));
    if(!rec){toast('⚠️ No registered user with this email.');return;}
    if(!rec.verified){toast('⚠️ That user hasn\'t verified their email yet.');return;}
    var members=db.meta.members||[];
    if(members.indexOf(email)!==-1){toast('Already has access.');return;}
    members.push(email);
    db.meta.members=members;
    await fbSet(tripId+'/meta',db.meta);
    document.getElementById('access-email').value='';
    toast('✅ Access granted to '+email); render();
  }catch(e){toast('⚠️ Failed. Try again.');}
}

async function doRevokeAccess(email){
  if(!confirm('Remove access for '+email+'?'))return;
  var members=(db.meta.members||[]).filter(m=>m!==email);
  db.meta.members=members;
  await fbSet(tripId+'/meta',db.meta);
  toast('🚫 Access removed'); render();
}

async function doDeleteUser(username){

async function doPromoteUser(username){

async function loadTrips(){

// ============ CALC ============
function balances(){var b={};db.friends.forEach(f=>b[f.id]=0);db.expenses.forEach(e=>{b[e.paidBy]=(b[e.paidBy]||0)+e.amount;Object.entries(e.splitAmong).forEach(([id,a])=>b[id]=(b[id]||0)-a);});return b;}
function settlements(){var b=balances(),debt=[],cred=[],res=[];Object.entries(b).forEach(([id,v])=>{if(v<-0.01)debt.push({id,a:-v});else if(v>0.01)cred.push({id,a:v});});var i=0,j=0;while(i<debt.length&&j<cred.length){var d=debt[i],c=cred[j],amt=Math.min(d.a,c.a),key=d.id+'-'+c.id;res.push({from:d.id,to:c.id,amount:amt,key,paid:db.settlements.includes(key)});d.a-=amt;c.a-=amt;if(d.a<0.01)i++;if(c.a<0.01)j++;}return res;}
function gname(id){return(db.friends.find(f=>f.id===id)||{name:'?'}).name;}
function upi(n,a){return 'upi://pay?pn='+encodeURIComponent(n)+'&am='+Math.round(a)+'&cu=INR&tn=Pachaax';}
function ctotal(){return Object.values(csplits).reduce((s,v)=>s+(parseFloat(v)||0),0);}

// ============ EXPENSE ACTIONS ============
async function doAddFriend(){var n=(document.getElementById('if')||{value:''}).value.trim();if(!n){toast('Enter a name!');return;}db.friends.push({id:'f'+Date.now(),name:n});fname='';modal=null;render();await saveTrip();}
async function doAddExpense(){var desc=(document.getElementById('ied')||{value:''}).value.trim();var amt=parseFloat((document.getElementById('iea')||{value:''}).value);var payer=(document.getElementById('iep')||{value:''}).value;if(!desc||isNaN(amt)||amt<=0||!payer){toast('Fill all fields!');return;}var split={};if(esplit==='equal'){var per=amt/db.friends.length;db.friends.forEach(f=>split[f.id]=per);}else{db.friends.forEach(f=>{var el=document.getElementById('cs'+f.id);if(el)csplits[f.id]=el.value;});var tot=ctotal();if(Math.abs(tot-amt)>0.01){toast('Split ₹'+Math.round(tot)+' ≠ ₹'+Math.round(amt));return;}db.friends.forEach(f=>split[f.id]=parseFloat(csplits[f.id])||0);}if(editId){var idx=db.expenses.findIndex(e=>e.id===editId);if(idx!==-1)db.expenses[idx]={...db.expenses[idx],description:desc,amount:amt,paidBy:payer,splitAmong:split};}else{db.expenses.push({id:'e'+Date.now(),description:desc,amount:amt,paidBy:payer,splitAmong:split,date:new Date().toISOString()});}modal=null;editId=null;edesc='';eamt='';epayer='';esplit='equal';csplits={};render();await saveTrip();}
async function doDelExpense(id){if(!confirm('Delete this expense?'))return;db.expenses=db.expenses.filter(e=>e.id!==id);render();await saveTrip();}
function doEditExpense(id){var e=db.expenses.find(x=>x.id===id);if(!e)return;editId=id;edesc=e.description;eamt=String(e.amount);epayer=e.paidBy;var vals=Object.values(e.splitAmong);var eq=vals.length>1&&vals.every(v=>Math.abs(v-vals[0])<0.01);esplit=eq?'equal':'custom';csplits=eq?{}:Object.fromEntries(Object.entries(e.splitAmong).map(([k,v])=>[k,String(v)]));modal='expense';render();setTimeout(()=>{var el=document.getElementById('ied');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}if(!eq)calcTotal();},100);}
async function doMarkPaid(key,paid){if(paid)db.settlements.push(key);else db.settlements=db.settlements.filter(s=>s!==key);render();await saveTrip();}
async function doReset(){if(!confirm('Delete ALL expenses & friends data?'))return;db={friends:[],expenses:[],settlements:[],meta:db.meta};render();await saveTrip();}
async function doCreateTrip(){var n=(document.getElementById('itn')||{value:''}).value.trim();var dt=(document.getElementById('itd')||{value:''}).value;if(!n){toast('Enter a trip name!');return;}tripId=n.toUpperCase().replace(/\s+/g,'-').replace(/[^A-Z0-9-]/g,'');localStorage.setItem('px-trip',tripId);db={friends:[],expenses:[],settlements:[],meta:{name:n,date:dt,created:new Date().toISOString(),createdBy:currentUser?currentUser.email:'',members:[]}};modal=null;render();await fbSet(tripId+'/meta',db.meta);}
function doSelectTrip(id){tripId=id;localStorage.setItem('px-trip',id);db={friends:[],expenses:[],settlements:[],meta:{}};modal=null;render();loadTrip();}
function doSwitchTrip(){tripId='';localStorage.removeItem('px-trip');db={friends:[],expenses:[],settlements:[],meta:{}};trips=[];render();loadTrips();}
function calcTotal(){var tot=0;db.friends.forEach(f=>{var el=document.getElementById('cs'+f.id);if(el)tot+=parseFloat(el.value)||0;});var ea=parseFloat((document.getElementById('iea')||{value:'0'}).value)||0;var match=ea>0&&Math.abs(tot-ea)<0.01;var el=document.getElementById('ctot');if(el){el.textContent='₹'+Math.round(tot)+(match?' ✅':ea>0?' (need ₹'+Math.round(ea)+')':'');el.style.color=match?'#16a34a':'#ef4444';}}
function doSetSplit(t){db.friends.forEach(f=>{var el=document.getElementById('cs'+f.id);if(el)csplits[f.id]=el.value;});var ded=document.getElementById('ied');if(ded)edesc=ded.value;var dea=document.getElementById('iea');if(dea)eamt=dea.value;var dep=document.getElementById('iep');if(dep)epayer=dep.value;esplit=t;render();setTimeout(()=>{if(t==='custom')calcTotal();},50);}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>toast('📋 Copied!')).catch(()=>{
    var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 Copied!');
  });
}

      <span style="font-size:18px;color:#d97706">→</span>
    </div>`).join('')
    :`<p style="text-align:center;color:#9ca3af;font-size:12px;margin-top:12px">No trips yet.</p>`;

  return `<div class="trip-screen">
    <div style="font-size:48px;margin-bottom:10px">💰</div>
    <h1 style="font-size:22px;font-weight:900;color:#92400e;margin-bottom:4px">Expense Track &amp; Settlement</h1>
    <p style="color:#6b7280;font-size:12px;margin-bottom:4px;text-align:center">👋 Hi, <strong>${currentUser.displayName}</strong>!</p>
    <div class="trip-box">
      <div style="font-weight:900;font-size:12px;color:#374151;margin-bottom:8px;text-transform:uppercase">✨ Create New Trip</div>
      <span class="lbl">Trip Name</span>
      <input id="itn" class="f" type="text" placeholder="e.g. Thailand 2025, Goa Trip" onkeydown="if(event.key==='Enter')doCreateTrip()">
      <span class="lbl">Trip Date</span>
      <input id="itd" class="f" type="date" value="${today}">
      <button class="btn primary" onclick="doCreateTrip()" style="width:100%;padding:12px;font-size:14px;margin-top:2px">🚀 Create Trip</button>
      ${trips.length?`<div style="margin-top:18px;font-weight:900;font-size:12px;color:#374151;margin-bottom:8px;text-transform:uppercase">📋 Your Trips</div>${list}`:''}
      ${!trips.length?`<p style="text-align:center;color:#9ca3af;font-size:11px;margin-top:12px">Loading your trips...</p>`:''}
      <div style="margin-top:16px;text-align:center">
        <button onclick="doLogout()" style="background:none;color:#9ca3af;font-size:11px;font-weight:600">⏏️ Log out (${currentUser.email})</button>
      </div>
    </div>
  </div>`;
}

// ============ TABS ============
function tabExp(bal){
  var total=db.expenses.reduce((s,e)=>s+e.amount,0);
  var owner=isOwner(db.meta);
  var h=`<div class="shd"><h2>All Expenses</h2>
    <div style="display:flex;gap:6px">
      ${owner?`<button class="btn danger sm" onclick="doDeleteCurrentTrip()" title="Delete this trip">🗑️ Trip</button>`:''}
      <button class="btn primary sm" onclick="editId=null;edesc='';eamt='';epayer='';esplit='equal';csplits={};modal='expense';render();setTimeout(()=>{var e=document.getElementById('ied');if(e)e.focus();},100)" ${!db.friends.length?'disabled':''}>+ Add</button>
    </div>
  </div>`;
  if(!db.friends.length) return h+`<div class="empty"><p>👥 Add friends first!</p><button class="btn primary" onclick="tab='friends';render()">Go to Friends</button></div>`;
  if(!db.expenses.length) return h+`<div class="empty"><p>💸 No expenses yet!</p></div>`;
  h+=`<div style="background:linear-gradient(90deg,#d97706,#ea580c);color:white;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:11px;font-weight:700;opacity:0.85">TOTAL EXPENSES</div>
    <div style="font-size:11px;opacity:0.7">${db.expenses.length} expense${db.expenses.length!==1?'s':''} · ${db.friends.length} people</div></div>
    <div style="font-size:24px;font-weight:900">₹${Math.round(total).toLocaleString()}</div>
  </div>`;
  h+=db.expenses.map(e=>{
    var tags=Object.entries(e.splitAmong).filter(([,a])=>a>0).map(([id,a])=>`<span class="tag">${gname(id)}: ₹${Math.round(a)}</span>`).join('');
    return `<div class="card">
      <div class="row">
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.description}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">Paid by <strong style="color:#d97706">${gname(e.paidBy)}</strong></div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
          <div style="font-size:18px;font-weight:900;color:#d97706">₹${Math.round(e.amount)}</div>
          <button class="ebtn" onclick="doEditExpense('${e.id}')">✏️</button>
          <button class="dbtn" onclick="doDelExpense('${e.id}')">✕</button>
        </div>
      </div>
      <div class="tags">${tags}</div>
    </div>`;
  }).join('');
  return h;
}

function tabFr(bal){
  var h=`<div class="shd"><h2>Your Group</h2>
    <button class="btn primary sm" onclick="fname='';modal='friend';render();setTimeout(()=>{var e=document.getElementById('if');if(e)e.focus();},100)">+ Add</button>
  </div>`;
  if(!db.friends.length) return h+`<div class="empty"><p>👥 Add your travel buddies!</p></div>`;
  h+=db.friends.map(f=>{
    var b=bal[f.id]||0,cls=b>0.01?'pos':b<-0.01?'neg':'zero';
    var txt=b>0.01?`Gets back ₹${Math.round(b)}`:b<-0.01?`Owes ₹${Math.round(-b)}`:'All settled ✓';
    return `<div class="fc">
      <div class="av">${initials(f.name)}</div>
      <div><div style="font-weight:900;font-size:15px">${f.name}</div><div class="${cls}">${txt}</div></div>
    </div>`;
  }).join('');
  h+=`<div style="text-align:center;margin-top:10px"><button class="btn danger sm" onclick="doReset()">🗑️ Reset All Expenses</button></div>`;
  return h;
}

function tabSet(bal,sets){
  if(!db.friends.length) return `<div class="empty"><p>Add friends first!</p></div>`;
  if(!db.expenses.length) return `<div class="empty"><p>No expenses yet!</p></div>`;
  var h=`<div class="btbl"><div style="font-weight:900;font-size:15px;margin-bottom:10px">Current Balances</div>`;
  h+=db.friends.map(f=>{
    var b=bal[f.id]||0,cls=b>0.01?'pos':b<-0.01?'neg':'zero';
    var txt=b>0.01?`+₹${Math.round(b)}`:b<-0.01?`-₹${Math.round(-b)}`:'₹0';
    return `<div class="brow"><span style="font-weight:700">${f.name}</span><span class="${cls}">${txt}</span></div>`;
  }).join('');
  h+=`</div><div class="gbox"><h3>💳 Payments to Make</h3>`;
  if(!sets.length) h+=`<p style="text-align:center;color:#16a34a;font-weight:700;padding:14px">🎉 All settled up!</p>`;
  else h+=sets.map(s=>`
  <div class="sc ${s.paid?'paid':''}">
    <div class="srow">
      <div style="font-weight:700;font-size:13px">${gname(s.from)} → ${gname(s.to)}</div>
      <div style="font-weight:900;font-size:17px;color:${s.paid?'#6b7280':'#16a34a'}">₹${Math.round(s.amount)}</div>
    </div>
    <div class="sbtns">
      ${s.paid
        ?`<button class="btn secondary sm" onclick="doMarkPaid('${s.key}',false)" style="width:100%">✓ Paid — Undo</button>`
        :`<a href="${upi(gname(s.to),s.amount)}" class="btn purple sm" style="flex:1">💳 Pay UPI</a>
          <button class="btn green sm" onclick="doMarkPaid('${s.key}',true)" style="flex:1">Mark Paid</button>`
      }
    </div>
  </div>`).join('');
  return h+`</div>`;
}

// ============ ADMIN TAB ============
function tabAdmin(){
  var bannedCount=allUsers.filter(u=>u.banned).length;
  var h=`<div class="admin-hdr">
    <div>
      <div style="font-size:11px;font-weight:700;opacity:0.8;text-transform:uppercase">Admin Dashboard</div>
      <div style="font-size:20px;font-weight:900;margin-top:2px">👑 Super User Panel</div>
    </div>
    <button class="btn sm" style="background:rgba(255,255,255,0.2);color:white;font-size:11px" onclick="loadAdminData()">🔄 Refresh</button>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="num">${allUsers.length}</div><div class="lbl2">Users</div></div>
    <div class="stat-box"><div class="num">${bannedCount}</div><div class="lbl2">Banned</div></div>
    <div class="stat-box"><div class="num">${allTrips.length}</div><div class="lbl2">Trips</div></div>
  </div>
  <div style="display:flex;background:white;border-radius:10px;padding:3px;gap:3px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.08)">
    <button class="btn sm ${adminSubTab==='users'?'purple':'secondary'}" onclick="adminSubTab='users';render()" style="flex:1">👥 Users (${allUsers.length})</button>
    <button class="btn sm ${adminSubTab==='trips'?'purple':'secondary'}" onclick="adminSubTab='trips';render()" style="flex:1">✈️ Trips (${allTrips.length})</button>
  </div>`;

  if(adminSubTab==='users'){
    if(!allUsers.length) h+=`<div class="empty"><p>No users. Click Refresh.</p></div>`;
    else h+=allUsers.map(u=>{
      var isMe=u.email===currentUser.email;
      var roleB=u.role==='admin'?`<span class="badge badge-admin">👑 Admin</span>`:`<span class="badge badge-user">👤 User</span>`;
      var banB=u.banned?`<span class="badge badge-banned">🚫 Banned</span>`:'';
      var verB=u.verified?'':`<span class="badge" style="background:#fef9c3;color:#854d0e">⚠️ Unverified</span>`;
      return `<div class="user-card ${u.banned?'banned':''}">
        <div class="av ${u.role==='admin'?'admin-av':''}">${initials(u.displayName||u.email)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;font-size:14px">${u.displayName||'—'} ${isMe?'<span style="font-size:10px;color:#d97706">(you)</span>':''}</div>
          <div style="font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.email}</div>
          <div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">${roleB}${banB}${verB}</div>
        </div>
        ${!isMe?`<div class="user-actions">
          ${u.banned
            ?`<button class="btn green sm" onclick="doBanUser('${u.username}',false)">✅ Unban</button>`
            :`<button class="btn danger sm" onclick="doBanUser('${u.username}',true)">🚫 Ban</button>`}
          ${u.role!=='admin'?`<button class="btn sm" style="background:#f5f3ff;color:#6d28d9" onclick="doPromoteUser('${u.username}')">👑 Admin</button>`:''}
          <button class="btn danger sm" onclick="doDeleteUser('${u.username}')">🗑️</button>
        </div>`:'<div style="color:#9ca3af;font-size:11px;text-align:right">You</div>'}
      </div>`;
    }).join('');
  } else {
    if(!allTrips.length) h+=`<div class="empty"><p>No trips. Click Refresh.</p></div>`;
    else h+=allTrips.map(t=>{
      var dateStr=t.date?new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';
      return `<div class="trip-admin-card">
        <div style="min-width:0;flex:1">
          <div style="font-weight:900;font-size:14px;color:#1f2937">${t.name}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">🏷️ ${t.id} · 📅 ${dateStr}</div>
          ${t.createdBy?`<div style="font-size:10px;color:#9ca3af;margin-top:1px">Owner: ${t.createdBy}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          ${tripId===t.id?`<span style="font-size:10px;font-weight:700;color:#16a34a">● NOW</span>`:''}
          <button class="btn sm secondary" onclick="doSelectTrip('${t.id}')">Open</button>
          <button class="btn danger sm" onclick="doAdminDeleteTrip('${t.id}')">🗑️</button>
        </div>
      </div>`;
    }).join('');
  }
  return h;
}

// ============ MODALS ============
function mFriend(){
  return `<div class="overlay" onclick="modal=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>👤 Add Friend</h3>
      <input id="if" class="f" type="text" placeholder="Friend's name" autocomplete="off" onkeydown="if(event.key==='Enter')doAddFriend()">
      <div class="mbtns">
        <button class="btn secondary" onclick="modal=null;render()">Cancel</button>
        <button class="btn primary" onclick="doAddFriend()">Add Friend</button>
      </div>
    </div>
  </div>`;
}

function mExpense(){
  var opts=db.friends.map(f=>`<option value="${f.id}" ${epayer===f.id?'selected':''}>${f.name}</option>`).join('');
  var isEdit=!!editId;
  var cbox=esplit==='custom'?`
    <div class="cbox">
      <div style="font-size:11px;font-weight:700;color:#6b7280;margin-bottom:7px">AMOUNT PER PERSON:</div>
      ${db.friends.map(f=>`
      <div class="crow">
        <span>${f.name}</span>
        <input id="cs${f.id}" class="ci" type="number" inputmode="decimal" placeholder="0" value="${csplits[f.id]||''}" oninput="calcTotal()">
      </div>`).join('')}
      <div class="ctot">
        <span style="font-weight:700">Total:</span>
        <span id="ctot" style="font-weight:900;color:#ef4444">₹0</span>
      </div>
    </div>`:'';
  return `<div class="overlay" onclick="modal=null;editId=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>${isEdit?'✏️ Edit Expense':'💸 Add Expense'}</h3>
      <span class="lbl">Description</span>
      <input id="ied" class="f" type="text" placeholder="e.g. Dinner, Hotel" autocomplete="off" value="${edesc}">
      <span class="lbl">Amount (₹)</span>
      <input id="iea" class="f" type="number" inputmode="decimal" placeholder="0" value="${eamt}" oninput="calcTotal()">
      <span class="lbl">Who Paid?</span>
      <select id="iep" class="f"><option value="">Select person</option>${opts}</select>
      <span class="lbl">Split Type</span>
      <div class="stgl">
        <button class="btn sm ${esplit==='equal'?'primary':'secondary'}" onclick="doSetSplit('equal')">⚖️ Equal</button>
        <button class="btn sm ${esplit==='custom'?'primary':'secondary'}" onclick="doSetSplit('custom')">✏️ Custom</button>
      </div>
      ${cbox}
      <div class="mbtns">
        <button class="btn secondary" onclick="modal=null;editId=null;render()">Cancel</button>
        <button class="btn primary" onclick="doAddExpense()">${isEdit?'💾 Save':'➕ Add Expense'}</button>
      </div>
    </div>
  </div>`;
}

function mAccess(){
  var meta=db.meta||{};
  var members=meta.members||[];
  var memberList=members.length
    ?members.map(m=>`<div class="member-row">
        <div class="av" style="width:32px;height:32px;font-size:13px">${initials(m)}</div>
        <span>${m}</span>
        <button class="btn danger sm" onclick="doRevokeAccess('${m}')">Remove</button>
      </div>`).join('')
    :`<p style="font-size:12px;color:#9ca3af;text-align:center;padding:10px 0">No members yet.</p>`;
  return `<div class="overlay" onclick="modal=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>🔑 Manage Trip Access</h3>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px">Trip: <strong>${meta.name||tripId}</strong> · Owner: you</div>
      <span class="lbl">Add Member by Email</span>
      <div style="display:flex;gap:7px;margin-bottom:14px">
        <input id="access-email" class="f" type="email" placeholder="friend@example.com" style="margin:0;flex:1" onkeydown="if(event.key==='Enter')doGrantAccess()">
        <button class="btn primary sm" onclick="doGrantAccess()">Grant</button>
      </div>
      <span class="lbl">Current Members</span>
      ${memberList}
      <div class="mbtns" style="margin-top:14px">
        <button class="btn secondary" onclick="modal=null;render()">Close</button>
      </div>
    </div>
  </div>`;
}

// ============ INIT — check URL for verify/reset tokens ============
(function init(){
  initEJS();
  var params=new URLSearchParams(window.location.search);
  var verifyEmail=params.get('verify');
  var verifyToken=params.get('token');
  var rEmail=params.get('reset');
  var rToken=params.get('rtoken');

  if(verifyEmail&&verifyToken){
    // Handle verification immediately
    render(); // show something first
    doVerify(decodeURIComponent(verifyEmail),verifyToken);
    return;
  }
  if(rEmail&&rToken){
    resetEmailLocal=decodeURIComponent(rEmail);
    resetTokenLocal=rToken;
    authMode='reset';
    render(); return;
  }

  render();
  if(currentUser){
    if(tripId) loadTrip(); else loadTrips();
  }
})();
</script>
